<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="calculatriche">
         <input type="text" class="resultat" id="result" placeholder="0">
        <div class="bouttons">
            <button class="btn" onclick="valeur('7')" >7</button>
            <button class="btn" onclick="valeur('8')" >8</button>
            <button class="btn" onclick="valeur('9')" >9</button>
            <button class="btn_operateur" onclick="valeur('+')">+</button>
            <button class="btn" onclick="valeur('4')" >4</button>
            <button class="btn" onclick="valeur('5')" >5</button>
            <button class="btn" onclick="valeur('6')" >6</button>
            <button class="btn_operateur" onclick="valeur('-')" >-</button>
            <button class="btn" onclick="valeur('1')" >1</button>
            <button class="btn" onclick="valeur('2')" >2</button>
            <button class="btn" onclick="valeur('3')" >3</button>
            <button class="btn_operateur" onclick="valeur('*')" >X</button>
            <button class="btn" onclick="valeur('.')">.</button>
            <button class="btn" onclick="valeur('0')" id="zero">0</button>
            <button class="btn" onclick="valeur('.')">.</button>
            <button class="btn_operateur" onclick="valeur('/')" >/</button>
            <button class="btnC" onclick="effacer()">C</button>
            <button class="btn_operateur2" onclick="supp()">AC</button>
            <button class="btn_operateur" onclick="valeur('%')">%</button>
            <button class="btn" onclick="calcul()" id="operateur_egal">=</button>
        </div>
    </div>
</body>
</html>
